name: CI
on:
  push:
    branches:
      - main
  pull_request:
jobs:
  pylint:
    name: Pylint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11
      - name: Use pip cache
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            pip-
      - name: Install dependencies
        run: |
          pip install wheel
          git clone --depth 1 https://github.com/broadinstitute/gnomad-constraint.git /tmp/gnomad-constraint
          cat > /tmp/gnomad-constraint/pyproject.toml << 'PYPROJECT'
          [build-system]
          requires = ["setuptools"]
          build-backend = "setuptools.build_meta"

          [project]
          name = "gnomad-constraint"
          version = "0.0.0"

          [tool.setuptools.packages.find]
          include = ["gnomad_constraint*"]
          PYPROJECT
          pip install /tmp/gnomad-constraint
          grep -v gnomad-constraint requirements.txt > /tmp/requirements-filtered.txt
          pip install -r /tmp/requirements-filtered.txt -r requirements-dev.txt
      - name: Run pre-commit
        run: |
          pre-commit run --all
